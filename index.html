<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no, maximum-scale=1.0">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>iOS 全屏极限测试</title>
  
  <style>
    /* 核心补丁 2：根节点彻底铺满物理屏幕，锁死回弹 */
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100vh; /* 安卓兜底 */
      min-height: -webkit-fill-available; /* iOS 魔法属性，强制包含底部小黑条区域 */
      
      /* 选一个极简浅色底色兜底，万一有缝隙也不会露出刺眼的纯白 */
      background-color: #f0f2f5; 
      
      overscroll-behavior-y: none; /* 彻底干掉 iOS 边缘滑动的橡皮筋白边 */
      overflow: hidden; /* 外部死死固定 */
      font-family: sans-serif;
    }

    /* 模拟你的 #app 主容器，用户的壁纸放在这里 */
    #app {
      width: 100%;
      height: 100%;
      /* 用渐变色测试：如果底部没有白条，且深蓝色一直延伸到屏幕最底端，说明成功了 */
      background: linear-gradient(to bottom, #e0c3fc 0%, #8ec5fc 100%);
      position: relative;
    }

    /* 内部内容滚动区 */
    .content-area {
      width: 100%;
      height: 100%;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch; /* 顺滑滚动 */
      
      /* 顶部留出刘海空间，底部留出 Dock 栏的空间防止内容被挡住 */
      padding-top: calc(20px + env(safe-area-inset-top));
      padding-bottom: 120px; 
      box-sizing: border-box;
      text-align: center;
      color: #333;
    }

    .content-area h1 {
      margin-top: 50px;
    }

    .card {
      background: rgba(255, 255, 255, 0.7);
      margin: 20px;
      padding: 30px;
      border-radius: 20px;
      box-shadow: 0 4px 15px rgba(0,0,0,0.05); /* 柔和的阴影 */
    }

    /* 核心补丁 3：Dock 栏精确定位与安全区处理 */
    .dock-container {
      position: absolute;
      bottom: 0;
      left: 0;
      width: 100%;
      
      /* 模拟 Dock 外观：半透明、毛玻璃 */
      background: rgba(255, 255, 255, 0.4);
      backdrop-filter: blur(15px);
      -webkit-backdrop-filter: blur(15px);
      
      display: flex;
      justify-content: space-evenly;
      align-items: center;
      
      /* 顶部 padding 控制图标和 Dock 边缘的距离 */
      padding-top: 15px;
      
      /* 【终极关键点】底部 padding：
         安卓用 20px，iOS 会自动加上底部小黑条的高度。
         这样 Dock 背景能沉底，但图标会被顶上来，不会被小黑条遮挡！ */
      padding-bottom: calc(20px + env(safe-area-inset-bottom));
      box-sizing: border-box;
    }

    /* 模拟 Dock 里的图标 */
    .dock-icon {
      width: 50px;
      height: 50px;
      background: rgba(255, 255, 255, 0.9);
      border-radius: 15px; /* 偏圆润的设计 */
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    }
  </style>
</head>
<body>

  <div id="app">
    <div class="content-area">
      <h1>全屏测试</h1>
      <p>如果是完美的，你应该看不到任何白边。</p>
      
      <div class="card">
        <p>往上滑动屏幕试试</p>
        <p>看顶部和底部会不会回弹露出白色底裤</p>
      </div>
      <div class="card"><p>占位内容...</p></div>
      <div class="card"><p>占位内容...</p></div>
    </div>

    <div class="dock-container">
      <div class="dock-icon"></div>
      <div class="dock-icon"></div>
      <div class="dock-icon"></div>
      <div class="dock-icon"></div>
    </div>
  </div>

</body>
</html>
